{% extends "base.html" %}
{% block title %}Movies{% endblock %}

{% block content %}
<h2 class="mb-4">Movies</h2>

<form method="get" class="row g-3 mb-4">
    <div class="col-md-4">
        <select name="genre" class="form-control">
            <option value="">Genre</option>
            {% for g in genres %}
                <option value="{{ g }}">{{ g }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-4">
        <select name="language" class="form-control">
            <option value="">Language</option>
            {% for l in languages %}
                <option value="{{ l }}">{{ l }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-4">
        <button class="btn btn-danger w-100">Filter</button>
    </div>
</form>

<div class="row">
{% for movie in movies %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <!-- ✅ Poster via URL -->
            <img src="{{ movie.poster_url }}" class="card-img-top" style="height:350px;object-fit:cover;">

            <div class="card-body">
                <h5>{{ movie.title }}</h5>
                <p>{{ movie.genre }} | {{ movie.language }}</p>

                <!-- ✅ YouTube embed -->
                <iframe width="100%" height="200"
                    src="{{ movie.trailer_url }}"
                    frameborder="0"
                    allowfullscreen>
                </iframe>

                <a href="{% url 'seat_layout' movie.id %}" class="btn btn-primary w-100 mt-3">
                    Book Tickets
                </a>
            </div>
        </div>
    </div>
{% empty %}
    <p>No movies found.</p>
{% endfor %}
</div>
{% endblock %}
