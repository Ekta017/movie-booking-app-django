{% extends "base.html" %}
{% block title %}Movies{% endblock %}

{% block content %}

<h2 class="mb-4">Movies</h2>

<!-- Filter Section -->
<form method="get" class="row g-3 mb-4">
    <div class="col-md-4">
        <select name="genre" class="form-select">
            <option value="">Genre</option>
            <option value="Action" {% if request.GET.genre == "Action" %}selected{% endif %}>Action</option>
            <option value="Comedy" {% if request.GET.genre == "Comedy" %}selected{% endif %}>Comedy</option>
            <option value="Drama" {% if request.GET.genre == "Drama" %}selected{% endif %}>Drama</option>
        </select>
    </div>

    <div class="col-md-4">
        <select name="language" class="form-select">
            <option value="">Language</option>
            <option value="English" {% if request.GET.language == "English" %}selected{% endif %}>English</option>
            <option value="Hindi" {% if request.GET.language == "Hindi" %}selected{% endif %}>Hindi</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-danger w-100">Filter</button>
    </div>
</form>

<hr>

<!-- Movies Grid -->
<div class="row">
    {% for movie in movies %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <img src="{{ movie.poster.url }}" class="card-img-top" alt="{{ movie.title }}">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ movie.title }}</h5>
                    <p class="card-text text-muted">
                        {{ movie.genre }} | {{ movie.language }}
                    </p>

                    <iframe
                        class="mb-3"
                        width="100%"
                        height="180"
                        src="{{ movie.trailer_url }}"
                        frameborder="0"
                        allowfullscreen>
                    </iframe>

                    <a href="/seats/{{ movie.id }}/"
                       class="btn btn-primary mt-auto">
                        Book Tickets
                    </a>
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-center">No movies found.</p>
    {% endfor %}
</div>

{% endblock %}
